name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  # Needed so the publish job can `gh workflow run dogfood.yml` after
  # hex publish — GITHUB_TOKEN's default scopes don't include this.
  actions: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to Hex
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"

      - run: mix deps.get
      - run: mix test
      - run: mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}

      # The release: published event fired by release-please above runs
      # under GITHUB_TOKEN, and GitHub silently suppresses downstream
      # workflow triggers from GITHUB_TOKEN. Dispatch the smoke test
      # explicitly so each release gets exercised end-to-end.
      - name: Trigger dogfood smoke
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          version="${TAG#v}"
          gh workflow run dogfood.yml --ref main -f version="$version"
